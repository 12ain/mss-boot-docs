name: (prod) Deploy docs

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".dumirc.ts"
      - ".github/workflows/docs.yml"
      - "aigc/**"
      - "docs/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "public/**"
      - "wrangler.toml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Package Dist
        run: tar -czvf dist.tar.gz dist

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: dist.tar.gz
          retention-days: 3

  deployment:
    runs-on: ubuntu-latest
    needs: build
    name: deployment
    environment: prod
    concurrency:
      group: cloudflare-docs-prod
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: docs

      - name: Unpack Artifact
        run: tar -xzvf dist.tar.gz

      - name: deploy prod
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.cf_api_token }}
          wranglerVersion: "4"
          command: deploy --env prod
